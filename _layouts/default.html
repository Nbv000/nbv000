<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  {% seo %}
  <link rel="icon" type="image/svg+xml" href="{{ '/favicon.svg' | relative_url }}">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  {% feed_meta %}
</head>
<body>
  <header class="site-header">
    <div class="container">
      <a href="{{ '/' | relative_url }}" class="site-title">{{ site.title }}</a>
      <nav>
        <a href="{{ '/' | relative_url }}">/</a>
        <a href="{{ '/cases/' | relative_url }}">кейсы</a>
        <a href="{{ '/services/' | relative_url }}">услуги</a>
        <a href="{{ '/contact/' | relative_url }}">контакты</a>
      </nav>
    </div>
  </header>

  <main class="container">
    {{ content }}
  </main>

  <footer class="site-footer">
    <div class="container">
      <span>// access denied — <a href="https://t.me/{{ site.contact_channel }}">@{{ site.contact_channel }}</a></span>
    </div>
  </footer>
</body>
</html>
